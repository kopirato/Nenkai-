<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Gallery Fixed</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
}

header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.upload-box{
padding:20px;
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
margin-bottom:20px;
}

input, select, button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:white;
cursor:pointer;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

small{
display:block;
padding:10px;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<h1>AI Enhanced Gallery (Fixed)</h1>
<p>Upload → Enhance → Publish</p>
</header>

<div class="container">

<div class="upload-box">
<input type="file" id="file">
<select id="watermark">
<option value="no">No watermark</option>
<option value="yes">Add watermark</option>
</select>

<button id="uploadBtn">Upload & Enhance</button>

<progress id="progress" value="0" max="100"></progress>
</div>

<div class="gallery" id="gallery"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

// ---------------- IMAGE ENHANCER ----------------
function enhanceImage(file){
return new Promise((resolve)=>{
const reader = new FileReader();

reader.onload = e=>{
let img = new Image();
img.src = e.target.result;

img.onload = ()=>{
let canvas = document.createElement("canvas");

canvas.width = img.width * 3;
canvas.height = img.height * 3;

let ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve(canvas.toDataURL("image/jpeg",0.95));
};
};

reader.readAsDataURL(file);
});
}

// ---------------- UPLOAD ----------------
document.getElementById("uploadBtn").onclick = async ()=>{
const file = document.getElementById("file").files[0];
const watermark = document.getElementById("watermark").value;

if(!file){
alert("Select a file");
return;
}

const enhanced = await enhanceImage(file);

const blob = await fetch(enhanced).then(r=>r.blob());

const fileRef = ref(storage, "gallery/" + Date.now() + ".jpg");

await uploadBytes(fileRef, blob);

const url = await getDownloadURL(fileRef);

await addDoc(collection(db,"gallery"),{
imageUrl:url,
watermark,
time:Date.now()
});

loadGallery();
alert("Uploaded!");
};

// ---------------- LOAD GALLERY ----------------
async function loadGallery(){
const gallery = document.getElementById("gallery");
gallery.innerHTML = "";

const q = query(collection(db,"gallery"), orderBy("time","desc"));
const snap = await getDocs(q);

snap.forEach(doc=>{
const data = doc.data();

gallery.innerHTML += `
<div class="card">
<img src="${data.imageUrl}">
<small>${data.watermark==="yes"?"© Selian Gallery":""}</small>
</div>
`;
});
}

loadGallery();

</script>

</body>
</html>
