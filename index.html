<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Selian AI Gallery</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
}

header{
padding:20px;
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.upload-box{
padding:20px;
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
margin-bottom:20px;
}

input, button{
padding:10px;
margin:8px 0;
width:100%;
border-radius:10px;
border:none;
}

button{
cursor:pointer;
background:white;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
border-radius:15px;
overflow:hidden;
background:#111;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

small{
display:block;
padding:10px;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<h1>AI Enhanced Gallery</h1>
<p>Upload → Enhance → Post Instantly</p>
</header>

<div class="container">

<div class="upload-box">
<h3>Upload Image</h3>

<input type="file" id="file">

<label>Enable Watermark</label>
<select id="watermark">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<button onclick="uploadImage()">Upload & Enhance</button>

<progress id="progress" value="0" max="100"></progress>
</div>

<div class="gallery" id="gallery"></div>

</div>

<script>
// 🔥 FIREBASE INIT (PUT YOUR CONFIG HERE)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();
const db = firebase.firestore();

// 📌 IMAGE ENHANCEMENT (SIMULATED "8K UPSCALE")
function enhanceImage(file, callback){
const reader = new FileReader();

reader.onload = function(e){
let img = new Image();
img.src = e.target.result;

img.onload = function(){

let canvas = document.createElement("canvas");

// upscale 3x
canvas.width = img.width * 3;
canvas.height = img.height * 3;

let ctx = canvas.getContext("2d");

// improve quality
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

// draw upscale
ctx.drawImage(img,0,0,canvas.width,canvas.height);

// subtle sharpening effect
ctx.globalAlpha = 0.2;
ctx.drawImage(canvas,0,0);

callback(canvas.toDataURL("image/jpeg",0.95));
};
};

reader.readAsDataURL(file);
}

// 📤 UPLOAD FUNCTION
function uploadImage(){
const file = document.getElementById("file").files[0];
const watermark = document.getElementById("watermark").value;

if(!file){
alert("Select image first");
return;
}

enhanceImage(file, async (enhancedDataUrl)=>{

let fileName = Date.now() + ".jpg";
let ref = storage.ref("gallery/" + fileName);

// convert base64 to blob
fetch(enhancedDataUrl)
.then(res=>res.blob())
.then(blob=>{

let uploadTask = ref.put(blob);

uploadTask.on("state_changed",

(snapshot)=>{
let progress = (snapshot.bytesTransferred / snapshot.totalBytes)*100;
document.getElementById("progress").value = progress;
},

(error)=>{
alert("Upload failed");
},

async ()=>{
let url = await uploadTask.snapshot.ref.getDownloadURL();

await db.collection("gallery").add({
imageUrl:url,
watermark:watermark,
time:Date.now()
});

loadGallery();
alert("Uploaded successfully!");
}
);

});

});
}

// 🖼 LOAD GALLERY
async function loadGallery(){
let gallery = document.getElementById("gallery");
gallery.innerHTML = "";

let snap = await db.collection("gallery").orderBy("time","desc").get();

snap.forEach(doc=>{
let data = doc.data();

gallery.innerHTML += `
<div class="card">
<img src="${data.imageUrl}">
<small>${data.watermark=="yes"?"© Selian Gallery":""}</small>
</div>
`;
});
}

loadGallery();
</script>

</body>
</html>
